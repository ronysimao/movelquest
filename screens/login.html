<!DOCTYPE html>

<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Asisto Fab - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1466b8",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111921",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Manrope', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center font-display">
    <div class="w-full max-w-md p-6">
        <!-- Logo and Branding -->
        <div class="flex flex-col items-center mb-10">
            <div class="bg-primary/10 p-3 rounded-xl mb-4">
                <div class="size-10 text-primary">
                    <svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 dark:text-white">Asisto Fab</h1>
            <p class="text-slate-600 dark:text-slate-400 mt-2 text-center">Gestão inteligente para sua fábrica de móveis
            </p>
        </div>
        <!-- Login Card -->
        <div
            class="bg-white dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-xl shadow-xl overflow-hidden">
            <!-- Decorative Header Image/Pattern -->
            <div class="h-32 w-full bg-gradient-to-r from-primary/20 via-primary/40 to-primary/20 relative"
                data-alt="Abstract blue geometric furniture pattern background">
                <div class="absolute inset-0 flex items-center justify-center">
                    <span class="text-primary font-bold opacity-30 text-4xl select-none">MÓVELQUEST</span>
                </div>
            </div>
            <div class="p-8">
                <h2 class="text-xl font-bold mb-6 text-slate-900 dark:text-white">Acesse sua conta</h2>
                <form class="space-y-5">
                    <!-- Email Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">E-mail
                            corporativo</label>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
                            <input
                                class="w-full pl-11 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600"
                                placeholder="exemplo@movelquest.com.br" required="" type="email" />
                        </div>
                    </div>
                    <!-- Password Field -->
                    <div class="flex flex-col gap-2">
                        <div class="flex justify-between items-center">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Senha</label>
                            <a class="text-xs font-semibold text-primary hover:underline" href="#">Esqueceu a senha?</a>
                        </div>
                        <div class="relative">
                            <span
                                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
                            <input
                                class="w-full pl-11 pr-11 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-600"
                                placeholder="Digite sua senha" required="" type="password" />
                            <button
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"
                                type="button">
                                <span class="material-symbols-outlined text-xl">visibility</span>
                            </button>
                        </div>
                    </div>
                    <!-- Validation Hint (Success/Error style) -->
                    <div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400 mt-1">
                        <span class="material-symbols-outlined text-sm">info</span>
                        <span>Sua senha deve conter pelo menos 8 caracteres.</span>
                    </div>
                    <!-- Remember Me -->
                    <div class="flex items-center gap-2">
                        <input
                            class="rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary bg-white dark:bg-slate-900"
                            id="remember" type="checkbox" />
                        <label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Manter
                            conectado</label>
                    </div>
                    <!-- Submit Button -->
                    <button
                        class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2 mt-4"
                        type="submit">
                        Entrar
                        <span class="material-symbols-outlined">login</span>
                    </button>
                </form>
                <div
                    class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-700/50 flex flex-col items-center gap-4">
                    <p class="text-sm text-slate-600 dark:text-slate-400">Não possui uma conta?</p>
                    <button
                        class="text-sm font-bold text-primary border border-primary/20 bg-primary/5 px-6 py-2 rounded-full hover:bg-primary/10 transition-colors">
                        Solicitar acesso à plataforma
                    </button>
                </div>
            </div>
        </div>
        <!-- Footer Info -->
        <footer class="mt-12 text-center space-y-2">
            <p class="text-xs text-slate-500 dark:text-slate-500">
                © 2026 Asisto Fab. Todos os direitos reservados.
            </p>
            <div class="flex justify-center gap-4 text-xs text-slate-400 dark:text-slate-600">
                <a class="hover:text-primary transition-colors" href="#">Termos de Uso</a>
                <span>•</span>
                <a class="hover:text-primary transition-colors" href="#">Privacidade</a>
                <span>•</span>
                <a class="hover:text-primary transition-colors" href="#">Suporte</a>
            </div>
        </footer>
    </div>
</body>

</html>
